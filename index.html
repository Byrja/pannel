<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bur Panel v1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div>
        <h1>Bur Panel</h1>
        <p>Сервисы · Задачи · Агенты · Алерты</p>
      </div>
      <div class="switcher">
        <button id="view-brief" class="active">Было/Сделаем/Будет</button>
        <button id="view-list">Буллеты</button>
      </div>
    </header>

    <main class="grid">
      <section class="card" id="services-card">
        <h2>Сервисы</h2>
        <div id="services" class="service-grid"></div>
      </section>

      <section class="card" id="alerts-card">
        <h2>Алерты</h2>
        <ul id="alerts" class="list"></ul>
      </section>

      <section class="card wide" id="tasks-card">
        <div class="row between">
          <h2>Задачи</h2>
          <div class="legend">
            <span class="dot green"></span>ОК
            <span class="dot yellow"></span>Риск
            <span class="dot red"></span>Критично
          </div>
        </div>
        <div class="kanban" id="kanban"></div>
      </section>

      <section class="card" id="owner-card">
        <h2>Задачи на тебя</h2>
        <ul id="ownerTasks" class="list"></ul>
      </section>

      <section class="card" id="agents-card">
        <h2>Агенты</h2>
        <div id="agents" class="agents"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
