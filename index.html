<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bur Panel — Team Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="topbar">
      <div>
        <h1>Bur Panel · Team Hub</h1>
        <p>Входящие → Проекты → Исполнение → Проверка → Релизы <span id="generatedAt"></span></p>
      </div>
    </header>

    <main class="grid">
      <section class="card" style="grid-column: span 12;">
        <h2>Входящие запросы от тебя</h2>
        <form id="newRequestForm" class="owner-form">
          <input id="newRequestInput" type="text" placeholder="Например: собрать телеграм-бота с оплатой и админкой" />
          <button type="submit">Запустить проект</button>
        </form>
        <div id="inbox" class="list-cards"></div>
      </section>

      <section class="card" style="grid-column: span 8;">
        <h2>Проекты в работе</h2>
        <div id="projects" class="list-cards"></div>
      </section>

      <section class="card" style="grid-column: span 4;">
        <h2>Исполнение агентами</h2>
        <div id="agents" class="list-cards"></div>
      </section>

      <section class="card" style="grid-column: span 7;">
        <h2>Контроль качества / согласование</h2>
        <div id="quality" class="list-cards"></div>
      </section>

      <section class="card" style="grid-column: span 5;">
        <h2>Релизы</h2>
        <div id="releases" class="list-cards"></div>
      </section>

      <section class="card" style="grid-column: span 12;">
        <h2>Лента действий</h2>
        <div id="activity" class="list-cards"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
